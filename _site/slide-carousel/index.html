<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Clip Animation with Slider</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slider-container">
        <div class="image-box">
            <img src="image-slider-1/1.jpg" alt="Image 1" class="image image1">
            <img src="image-slider-1/2.jpg" alt="Image 2" class="image image2">
        </div>
        <input type="range" min="0" max="100" value="50" class="slider" id="slider">
    </div>
    <script src="script.js"></script>
</body>
</html>
